# This workflow will build and publish the plugin on tag create

name: Publish vscode-psl

on:
  push:
    tags: 'v*'

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
    - run: npm install
    - run: npm run test
  
  publish:
    needs: test
    name: Publish vscode-psl
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '16.x'
        cache: 'npm'
    - run: npm install .
    - env:
          VSCODE_TOKEN: ${{ secrets.VSCODE_TOKEN_PUBLISH }}
      if: ${{ contains(github.ref, '-rc') }}
      run: npm run build && npm i -g vsce && vsce package --pre-release && vsce publish --pre-release -p $VSCODE_TOKEN
      name: Publish Pre-Release
    - env:
          VSCODE_TOKEN: ${{ secrets.VSCODE_TOKEN_PUBLISH }}
      run: npm run build && npm i -g vsce && vsce package && vsce publish -p $VSCODE_TOKEN
      if: ${{ ! contains(github.ref, '-rc') }}
      name: Publish Release
